<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>POS Aguacates</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    *{box-sizing:border-box}body{margin:0;font-family:system-ui,Arial;background:#f3f6f4;color:#20342a}button,input,select{font:inherit}button{cursor:pointer;border:0;border-radius:8px;padding:10px 14px}.primary{background:#168b52;color:#fff}.danger{background:#c0392b;color:#fff}.secondary{background:#34495e;color:#fff}.hidden{display:none!important}
    #login{min-height:100vh;display:grid;place-items:center;background:#168b52}.login-card{width:min(400px,92vw);background:#fff;padding:32px;border-radius:18px;box-shadow:0 12px 35px #0003}.login-card input{width:100%;padding:12px;margin:7px 0}.login-card button{width:100%;margin-top:12px}
    header{background:#168b52;color:#fff;padding:14px 22px;display:flex;align-items:center;justify-content:space-between}.tabs{display:flex;gap:8px;flex-wrap:wrap;padding:12px 20px;background:#fff;box-shadow:0 2px 8px #0001}.tab{background:#e6f2eb;color:#185d3d}.seccion{display:none;padding:22px}.seccion.activa{display:block}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px}.card,.panel{background:#fff;border-radius:14px;padding:18px;box-shadow:0 3px 12px #0001}.pos-layout{display:grid;grid-template-columns:2fr 1fr;gap:18px}.producto input{width:100%;padding:8px;margin:8px 0}.money{font-weight:700;color:#168b52}.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}.form-grid input,.form-grid select{padding:10px;border:1px solid #ccd7d0;border-radius:8px}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.row{display:flex;justify-content:space-between;gap:14px;padding:10px 0;border-bottom:1px solid #e8ece9}.muted{color:#687a70;font-size:.9rem}table{width:100%;border-collapse:collapse}th,td{text-align:left;padding:9px;border-bottom:1px solid #e5eae7}canvas{max-height:330px}@media(max-width:800px){.pos-layout{grid-template-columns:1fr}.seccion{padding:14px}}
  </style>
</head>
<body>
  <div id="login">
    <form class="login-card" id="loginForm">
      <h1>POS Aguacates 🥑</h1>
      <input id="username" autocomplete="username" placeholder="Username" required>
      <input id="password" type="password" autocomplete="current-password" placeholder="Contraseña" required>
      <button class="primary" type="submit">Iniciar sesión</button>
      <p id="loginError" class="muted"></p>
    </form>
  </div>

  <div id="sistema" class="hidden">
    <header><strong>POS Aguacates 🥑</strong><span><span id="sesion"></span> <button id="logout">Cerrar sesión</button></span></header>
    <nav class="tabs">
      <button class="tab" data-section="pos">POS</button><button class="tab" data-section="clientes">Clientes</button>
      <button class="tab" data-section="cuentas">Cuentas</button><button class="tab admin" data-section="inventario">Inventario</button>
      <button class="tab admin" data-section="ventas">Ventas</button><button class="tab" data-section="dashboard">Dashboard</button>
    </nav>

    <main>
      <section id="pos" class="seccion activa"><div class="pos-layout"><div><h2>Productos</h2><div id="productos" class="grid"></div></div><aside class="panel"><h2>Carrito</h2><div id="carrito"></div><h2 class="money" id="total">$0.00</h2><select id="clienteVenta" style="width:100%;padding:10px;margin:8px 0"></select><select id="tipoPago" style="width:100%;padding:10px;margin:8px 0"><option value="CONTADO">Contado</option><option value="CREDITO">Crédito</option></select><div class="actions"><button class="primary" id="vender">Vender</button><button class="secondary" id="imprimir" disabled>Imprimir último ticket</button></div></aside></div></section>

      <section id="clientes" class="seccion"><h2>Clientes</h2><form id="clienteForm" class="panel"><input type="hidden" id="clienteId"><div class="form-grid"><input id="nombreRazon" placeholder="Nombre o razón social" required><input id="rfc" placeholder="RFC" maxlength="13"><input id="telefono" placeholder="Teléfono"><input id="correo" type="email" placeholder="Correo electrónico"></div><div class="actions"><button class="primary" type="submit">Guardar cliente</button><button type="button" id="cancelarEdicion" class="hidden">Cancelar edición</button></div></form><div id="listaClientes" class="grid" style="margin-top:16px"></div></section>

      <section id="cuentas" class="seccion"><h2>Cuentas por cobrar</h2><div id="listaCuentas" class="grid"></div><div id="detalleCuenta" class="panel hidden" style="margin-top:16px"></div></section>

      <section id="inventario" class="seccion"><h2>Inventario</h2><form id="movimientoForm" class="panel form-grid"><select id="productoMovimiento"></select><select id="tipoMovimiento"><option value="ENTRADA">Entrada</option><option value="SALIDA">Salida / merma</option></select><input id="cantidadMovimiento" type="number" min="0.01" step="0.01" placeholder="Cantidad" required><input id="motivoMovimiento" placeholder="Motivo" required><button class="primary">Registrar</button></form><div id="movimientos" style="margin-top:16px"></div></section>

      <section id="ventas" class="seccion"><h2>Ventas recientes</h2><div id="listaVentas" class="panel"></div></section>

      <section id="dashboard" class="seccion"><h2>Dashboard</h2><div id="metricas" class="grid"></div><div class="panel" style="margin-top:16px"><h3>Ventas de los últimos 7 días</h3><canvas id="graficaSemanal"></canvas></div><div class="actions"><button class="secondary" id="reporte">Abrir reporte PDF</button></div></section>
    </main>
  </div>

  <script>
    const API=''; let usuario=null, token=localStorage.getItem('tokenPOS'), productos=[], clientes=[], carrito=[], ultimaVenta=null, grafica=null;
    const dinero=new Intl.NumberFormat('es-MX',{style:'currency',currency:'MXN',minimumFractionDigits:2,maximumFractionDigits:2});
    const cantidad=n=>new Intl.NumberFormat('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2}).format(Number(n)||0);
    const esc=v=>String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));

    async function api(path,options={}){const headers={...(options.body?{'Content-Type':'application/json'}:{}),...(token?{Authorization:`Bearer ${token}`}:{})};const response=await fetch(API+path,{...options,headers:{...headers,...options.headers}});if(response.status===401){cerrarSesion();throw new Error('Tu sesión expiró');}const data=await response.json().catch(()=>({}));if(!response.ok)throw new Error(data.error||'Error en la solicitud');return data}
    function mostrar(id){document.querySelectorAll('.seccion').forEach(x=>x.classList.toggle('activa',x.id===id));if(id==='cuentas')cargarCuentas();if(id==='inventario')cargarInventario();if(id==='ventas')cargarVentas();if(id==='dashboard')cargarDashboard()}
    document.querySelectorAll('[data-section]').forEach(b=>b.onclick=()=>mostrar(b.dataset.section));

    document.getElementById('loginForm').onsubmit=async e=>{e.preventDefault();try{const data=await api('/auth/login',{method:'POST',body:JSON.stringify({username:username.value.trim(),password:password.value})});token=data.token;usuario=data.usuario;localStorage.setItem('tokenPOS',token);localStorage.setItem('usuarioPOS',JSON.stringify(usuario));iniciarApp()}catch(err){loginError.textContent=err.message}};
    function iniciarApp(){login.classList.add('hidden');sistema.classList.remove('hidden');sesion.textContent=`${usuario.nombre||usuario.username} · ${usuario.rol}`;document.querySelectorAll('.admin').forEach(x=>x.classList.toggle('hidden',usuario.rol!=='ADMON_GRAL'));cargarProductos();cargarClientes()}
    function cerrarSesion(){localStorage.removeItem('tokenPOS');localStorage.removeItem('usuarioPOS');location.reload()} document.getElementById('logout').onclick=cerrarSesion;

    async function cargarProductos(){productos=await api('/productos');productosDiv.innerHTML='';document.getElementById('productos').innerHTML=productos.map(p=>`<article class="card producto"><h3>${esc(p.nombre)}</h3><div class="money">${dinero.format(p.precio_venta)}</div><div class="muted">Stock: ${cantidad(p.stock)} ${esc(p.unidad)}</div>${usuario.rol==='ADMON_GRAL'?`<button onclick="editarPrecio(${p.id})">Modificar precio</button>`:''}<input id="cant-${p.id}" type="number" min="0.01" max="${p.stock}" step="0.01" value="1"><button class="primary" onclick="agregar(${p.id})">Agregar</button></article>`).join('');productoMovimiento.innerHTML=productos.map(p=>`<option value="${p.id}">${esc(p.nombre)} (${cantidad(p.stock)})</option>`).join('')}
    const productosDiv=document.getElementById('productos');
    async function editarPrecio(id){const p=productos.find(x=>x.id===id),nuevo=prompt('Nuevo precio de venta',p.precio_venta);if(nuevo===null)return;try{await api(`/productos/${id}/precio`,{method:'PUT',body:JSON.stringify({precio_venta:Number(nuevo)})});await cargarProductos()}catch(e){alert(e.message)}}
    function agregar(id){const p=productos.find(x=>x.id===id),cant=Number(document.getElementById(`cant-${id}`).value),actual=carrito.find(x=>x.producto_id===id),acumulado=cant+(actual?.cantidad||0);if(!(cant>0)||acumulado>Number(p.stock))return alert('Cantidad inválida o superior al stock');if(actual)actual.cantidad=acumulado;else carrito.push({producto_id:id,nombre:p.nombre,cantidad:cant,precio:Number(p.precio_venta)});dibujarCarrito()}
    function dibujarCarrito(){carritoDiv.innerHTML=carrito.map((p,i)=>`<div class="row"><span>${esc(p.nombre)}<br><small>${cantidad(p.cantidad)} × ${dinero.format(p.precio)}</small></span><span>${dinero.format(p.cantidad*p.precio)} <button onclick="quitar(${i})">×</button></span></div>`).join('');total.textContent=dinero.format(carrito.reduce((s,p)=>s+p.cantidad*p.precio,0))}const carritoDiv=document.getElementById('carrito');function quitar(i){carrito.splice(i,1);dibujarCarrito()}
    vender.onclick=async()=>{if(!carrito.length)return alert('Agrega productos');try{const data=await api('/ventas/crear',{method:'POST',body:JSON.stringify({cliente_id:Number(clienteVenta.value),tipo_pago:tipoPago.value,productos:carrito.map(({producto_id,cantidad})=>({producto_id,cantidad}))})});ultimaVenta={...data,cliente:clienteVenta.options[clienteVenta.selectedIndex].text,tipo:tipoPago.value,fecha:new Date()};carrito=[];dibujarCarrito();imprimir.disabled=false;await cargarProductos();alert(`Venta #${data.venta_id} registrada por ${dinero.format(data.total)}`)}catch(e){alert(e.message)}};
    imprimir.onclick=async()=>{if(!ultimaVenta)return;try{const imp=await api(`/ventas/${ultimaVenta.venta_id}/imprimir`,{method:'POST'}),v=ultimaVenta,w=window.open('','ticket','width=420,height=650');w.document.write(`<meta charset="utf-8"><style>body{font-family:monospace;padding:18px}h2{text-align:center}table{width:100%}td:last-child{text-align:right}</style><h2>AGUACATES DE PERIBÁN</h2><h2>${imp.leyenda}</h2><p>Folio: ${v.venta_id}<br>Cliente: ${esc(v.cliente)}<br>Pago: ${v.tipo}<br>Fecha: ${v.fecha.toLocaleString('es-MX')}</p><hr><table>${v.productos.map(p=>`<tr><td>${cantidad(p.cantidad)} ${esc(p.nombre)}</td><td>${dinero.format(p.subtotal)}</td></tr>`).join('')}</table><hr><h2>Total ${dinero.format(v.total)}</h2>`);w.document.close();w.print()}catch(e){alert(e.message)}};

    async function cargarClientes(){clientes=await api('/clientes');clienteVenta.innerHTML=clientes.map(c=>`<option value="${c.id}">${esc(c.nombre_razon_social)}</option>`).join('');listaClientes.innerHTML=clientes.map(c=>`<article class="card"><h3>${esc(c.nombre_razon_social)}</h3><p>${esc(c.rfc||'Sin RFC')} · ${esc(c.telefono||'Sin teléfono')}<br>${esc(c.correo_electronico||'Sin correo')}</p>${usuario.rol==='ADMON_GRAL'?`<button onclick="seleccionarCliente(${c.id})">Editar</button>`:''}</article>`).join('')}
    function seleccionarCliente(id){const c=clientes.find(x=>x.id===id);clienteId.value=c.id;nombreRazon.value=c.nombre_razon_social;rfc.value=c.rfc||'';telefono.value=c.telefono||'';correo.value=c.correo_electronico||'';cancelarEdicion.classList.remove('hidden')}
    cancelarEdicion.onclick=()=>{clienteForm.reset();clienteId.value='';cancelarEdicion.classList.add('hidden')};clienteForm.onsubmit=async e=>{e.preventDefault();const body=JSON.stringify({nombre_razon_social:nombreRazon.value,rfc:rfc.value,telefono:telefono.value,correo_electronico:correo.value});try{await api(clienteId.value?`/clientes/${clienteId.value}`:'/clientes/crear',{method:clienteId.value?'PUT':'POST',body});cancelarEdicion.click();await cargarClientes()}catch(e){alert(e.message)}};

    async function cargarCuentas(){try{const data=await api('/cuentas');listaCuentas.innerHTML=data.length?data.map(c=>`<article class="card"><h3>${esc(c.nombre_razon_social)}</h3><div class="money">${dinero.format(c.saldo_total)}</div><button onclick="verCuenta(${c.cliente_id})">Detalle e historial</button></article>`).join(''):'<p>Sin saldos pendientes.</p>'}catch(e){alert(e.message)}}
    async function verCuenta(id){try{const d=await api(`/cuentas/cliente/${id}`);detalleCuenta.classList.remove('hidden');detalleCuenta.innerHTML=`<h3>Cuentas</h3>${d.cuentas.map(c=>`<div class="row"><span>Venta #${c.venta_id} · ${c.estado}<br>${new Date(c.fecha).toLocaleString('es-MX')}</span><span>${dinero.format(c.saldo_pendiente)} ${c.estado==='PENDIENTE'?`<button class="primary" onclick="abonar(${c.id},${c.saldo_pendiente})">Abonar</button>`:''}</span></div>`).join('')}<h3>Historial de abonos</h3>${d.pagos.length?d.pagos.map(p=>`<div class="row"><span>${new Date(p.fecha).toLocaleString('es-MX')} · ${esc(p.metodo_pago)}</span><strong>${dinero.format(p.monto)}</strong></div>`).join(''):'<p>Sin abonos.</p>'}`}catch(e){alert(e.message)}}
    async function abonar(id,saldo){const monto=prompt(`Monto a abonar (saldo ${dinero.format(saldo)})`);if(monto===null)return;const metodo=prompt('Método de pago','EFECTIVO');if(metodo===null)return;try{await api('/cuentas/abonar',{method:'POST',body:JSON.stringify({cuenta_id:id,monto:Number(monto),metodo_pago:metodo})});await cargarCuentas();detalleCuenta.classList.add('hidden')}catch(e){alert(e.message)}}

    async function cargarInventario(){await cargarProductos();const data=await api('/inventario');movimientos.innerHTML=data.map(m=>`<div class="panel row"><span>${esc(m.producto)} · ${esc(m.motivo)}<br><small>${new Date(m.fecha).toLocaleString('es-MX')}</small></span><strong>${m.tipo==='ENTRADA'?'+':'−'}${cantidad(m.cantidad)}</strong></div>`).join('')}
    movimientoForm.onsubmit=async e=>{e.preventDefault();try{await api('/inventario/movimiento',{method:'POST',body:JSON.stringify({producto_id:Number(productoMovimiento.value),tipo:tipoMovimiento.value,cantidad:Number(cantidadMovimiento.value),motivo:motivoMovimiento.value})});movimientoForm.reset();await cargarInventario()}catch(e){alert(e.message)}};

    async function cargarVentas(){const data=await api('/ventas');listaVentas.innerHTML=data.map(v=>`<div class="row"><span>#${v.id} · ${esc(v.cliente||'Sin cliente')} · ${esc(v.username||'')}<br><small>${new Date(v.fecha).toLocaleString('es-MX')} · ${v.estado_venta}</small></span><span>${dinero.format(v.total)} ${v.estado_venta==='ACTIVA'?`<button class="danger" onclick="cancelarVenta(${v.id})">Cancelar</button>`:''}</span></div>`).join('')}
    async function cancelarVenta(id){const motivo=prompt('Motivo de cancelación');if(!motivo)return;try{await api(`/ventas/${id}/cancelar`,{method:'POST',body:JSON.stringify({motivo})});await cargarVentas();await cargarProductos()}catch(e){alert(e.message)}}
    async function cargarDashboard(){try{const d=await api('/stats');metricas.innerHTML=[['Ventas hoy',d.ventas_hoy],['Ingresos hoy',dinero.format(d.ingresos_hoy)],['Clientes',d.clientes],['Deuda',dinero.format(d.deuda_total)]].map(x=>`<div class="card"><h3>${x[0]}</h3><h2>${x[1]}</h2></div>`).join('');const mapa=new Map(d.semanal.map(x=>[String(x.dia).slice(0,10),Number(x.total)])),labels=[],values=[];for(let i=6;i>=0;i--){const f=new Date();f.setHours(0,0,0,0);f.setDate(f.getDate()-i);const k=`${f.getFullYear()}-${String(f.getMonth()+1).padStart(2,'0')}-${String(f.getDate()).padStart(2,'0')}`;labels.push(f.toLocaleDateString('es-MX',{weekday:'short',day:'2-digit'}));values.push(mapa.get(k)||0)}if(grafica)grafica.destroy();grafica=new Chart(graficaSemanal,{type:'bar',data:{labels,datasets:[{label:'Ventas',data:values,backgroundColor:'#168b52'}]},options:{scales:{y:{beginAtZero:true,ticks:{callback:v=>dinero.format(v)}}}}})}catch(e){alert(e.message)}}
    reporte.onclick=async()=>{try{const r=await fetch('/reportes/ventas-pdf',{headers:{Authorization:`Bearer ${token}`}});if(!r.ok)throw new Error('No fue posible generar el reporte');const url=URL.createObjectURL(await r.blob());window.open(url,'_blank');setTimeout(()=>URL.revokeObjectURL(url),60000)}catch(e){alert(e.message)}};

    try{usuario=JSON.parse(localStorage.getItem('usuarioPOS'))}catch{} if(token&&usuario)iniciarApp();
  </script>
</body>
</html>
