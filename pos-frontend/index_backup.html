<!DOCTYPE html>
<html>
<head>
  <title>POS Aguacates</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    .producto { margin-bottom: 10px; }
    button { margin-left: 10px; }
  </style>
</head>
<body>

<h2>POS Aguacates 🥑</h2>

<h3>Productos</h3>
<div id="productos"></div>

<h3>Carrito</h3>
<ul id="carrito"></ul>

<h3>Total: $<span id="total">0</span></h3>

<select id="tipo_pago">
  <option value="CONTADO">Contado</option>
  <option value="CREDITO">Crédito</option>
</select>

<br><br>

<button onclick="enviarVenta()">Vender</button>

<script>
let carrito = [];
let total = 0;

// 🔹 Cargar productos desde backend
fetch('http://127.0.0.1:3000/productos')
  .then(res => res.json())
  .then(data => {

    console.log("PRODUCTOS:", data); // 👈 AQUÍ VA

    const div = document.getElementById('productos');

    data.forEach(p => {
      div.innerHTML += `
        <div class="producto">
          ${p.nombre} - $${p.precio_venta}
          <button onclick="agregar(${p.id}, '${p.nombre}', ${p.precio_venta})">
            Agregar
          </button>
        </div>
      `;
    });
  })
  .catch(err => console.error("ERROR:", err));

// 🔹 Agregar al carrito
function agregar(id, nombre, precio) {
  const existente = carrito.find(p => p.producto_id === id);

if (existente) {
  existente.cantidad++;
} else {
  carrito.push({ producto_id: id, nombre, cantidad: 1, precio });
}

total += precio;
actualizarCarrito();
}

// 🔹 Mostrar carrito
function actualizarCarrito() {
  const lista = document.getElementById('carrito');
  lista.innerHTML = '';

  total = 0;

  carrito.forEach(item => {
    const subtotal = item.cantidad * item.precio;
    total += subtotal;

    lista.innerHTML += `
      <li>
        ${item.nombre} x${item.cantidad} - $${subtotal}
        <button onclick="quitar(${item.producto_id})">❌</button>
      </li>
    `;
  });

  document.getElementById('total').innerText = total;
}

function quitar(id) {
  carrito = carrito.filter(p => p.producto_id !== id);
  actualizarCarrito();
}

// 🔹 Enviar venta
function enviarVenta() {
  fetch('http://127.0.0.1:3000/ventas/crear', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      cliente_id: 1,
      usuario_id: 1,
      tipo_pago: document.getElementById('tipo_pago').value,
      productos: carrito
    })
  })
  .then(res => res.json())
  .then(data => {
    alert("Venta realizada!");
    carrito = [];
    total = 0;
    actualizarCarrito();
  });
}
</script>

</body>
</html>
